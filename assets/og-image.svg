<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="55%" stop-color="#161022"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="45%">
      <stop offset="0%" stop-color="#ff4d6d" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff4d6d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7a8f"/>
      <stop offset="50%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#d93456"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#ff4d6d" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <circle cx="900" cy="200" r="180" fill="#7c9cff" opacity="0.08"/>
  <circle cx="200" cy="500" r="140" fill="#ff4d6d" opacity="0.06"/>
  <!-- Button -->
  <g filter="url(#shadow)">
    <circle cx="600" cy="250" r="110" fill="url(#btn)"/>
    <circle cx="600" cy="250" r="110" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="4"/>
    <ellipse cx="570" cy="215" rx="48" ry="28" fill="#ffffff" opacity="0.22"/>
    <text x="600" y="262" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="4">PUSH</text>
  </g>
  <!-- Wordmark -->
  <text x="600" y="430" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#f4f4f8" letter-spacing="-1">Push Thru</text>
  <text x="600" y="485" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#9898a8">Tap. Score. Beat friends.</text>
  <text x="600" y="560" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#7c9cff">Web · iOS · Android</text>
</svg>
